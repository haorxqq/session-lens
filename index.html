<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Conversations</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%91%80</text></svg>">

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f7f9;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --card-hover: #f0f3f7;
      --border: #e4e7ec;
      --border-strong: #d3d8e0;
      --text: #1c2430;
      --text-muted: #687283;
      --text-dim: #98a2b3;
      --accent: #2563eb;
      --accent-dim: #e6efff;
      --user-bg: #e7f0ff;
      --user-border: #c2d9ff;
      --assistant-bg: #ffffff;
      --assistant-border: #e4e7ec;
      --tool-bg: #f6f8fa;
      --tool-border: #e4e7ec;
      --thinking-bg: #f7f4fd;
      --thinking-border: #e4d9f7;
      --green: #15a34a;
      --purple: #7c3aed;
      --orange: #d97706;
      --code-bg: #f6f8fa;
      --code-text: #d6336c;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.06);
      --radius: 10px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header .logo {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, #58a6ff, #a371f7);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .header-spacer { flex: 1; }
    .session-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .reload-btn {
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reload-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      min-width: 240px;
      max-width: 480px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      resize: horizontal;
      overflow: auto;
    }

    .sidebar-controls {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
    }
    .search-box svg { color: var(--text-muted); flex-shrink: 0; }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
    }
    .search-box input::placeholder { color: var(--text-dim); }

    .filter-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .filter-label {
      flex-shrink: 0;
      width: 46px;
      padding-top: 3px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .filter-chips {
      flex: 1;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .session-list::-webkit-scrollbar { width: 6px; }
    .session-list::-webkit-scrollbar-track { background: transparent; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .session-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 3px;
      transition: all 0.12s ease;
    }
    .session-item:hover { background: var(--card-hover); }
    .session-item.active {
      background: var(--accent-dim);
      border-color: var(--user-border);
      box-shadow: var(--shadow-sm);
    }

    .session-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .session-item.active .session-title { color: var(--accent); }

    .session-id {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .session-id:hover { color: var(--accent); }

    .session-path {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: rtl;
      text-align: left;
    }

    .session-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }
    .session-project {
      font-size: 10px;
      color: var(--purple);
      background: rgba(124, 58, 237, 0.1);
      padding: 1px 6px;
      border-radius: 4px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .source-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .source-badge.claude { color: #c2410c; background: rgba(234, 88, 12, 0.12); }
    .source-badge.opencode { color: #0e7490; background: rgba(8, 145, 178, 0.12); }
    .session-date {
      font-size: 10px;
      color: var(--text-dim);
    }
    .session-msgs {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .session-preview {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    /* ── Content panel ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .content-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
      flex-shrink: 0;
    }
    .content-header-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .content-header-top h2 { flex: 1; }
    .content-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .resume-btn {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .resume-btn:hover { filter: brightness(1.08); }
    .resume-btn:disabled { opacity: 0.6; cursor: default; }
    .copy-cmd-btn {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .copy-cmd-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-cmd-btn-danger:hover { color: #e5484d; border-color: #e5484d; }

    .rename-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .rename-panel input {
      flex: 1;
      min-width: 200px;
      font-size: 13px;
      color: var(--text);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      outline: none;
    }
    .rename-panel input:focus { border-color: var(--accent); }
    .rename-cmd {
      flex-basis: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .rename-cmd code {
      flex: 1;
      min-width: 200px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      overflow-x: auto;
      white-space: pre;
    }
    .rename-note {
      flex-basis: 100%;
      font-size: 11px;
      color: var(--orange);
    }
    .rename-note-danger { color: #e5484d; }

    .content-header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    .content-header-meta span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* ── Messages ── */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 100%;
    }
    .msg-wrapper-user {
      align-items: flex-end;
      padding-left: 60px;
    }
    .msg-wrapper-assistant {
      align-items: flex-start;
      padding-right: 60px;
    }

    .msg-role {
      font-size: 10px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
    }
    .msg-role-user { color: var(--accent); flex-direction: row-reverse; }
    .msg-role-assistant { color: var(--green); }
    .msg-role .msg-time {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 400;
    }

    .msg-bubble {
      border-radius: 14px;
      padding: 11px 15px;
      line-height: 1.65;
      font-size: 14px;
      border: 1px solid transparent;
      max-width: 100%;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }
    .msg-bubble-user {
      background: var(--user-bg);
      border-color: var(--user-border);
      border-bottom-right-radius: 4px;
    }
    .msg-bubble-assistant {
      background: var(--assistant-bg);
      border-color: var(--assistant-border);
      border-bottom-left-radius: 4px;
    }

    /* ── Markdown ── */
    .msg-bubble p { margin: 0 0 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3,
    .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 {
      margin: 16px 0 8px;
      color: var(--text);
      line-height: 1.3;
    }
    .msg-bubble h1:first-child, .msg-bubble h2:first-child { margin-top: 0; }
    .msg-bubble h1 { font-size: 18px; }
    .msg-bubble h2 { font-size: 16px; }
    .msg-bubble h3 { font-size: 14px; }
    .msg-bubble strong { color: var(--text); }
    .msg-bubble em { color: #475467; }
    .msg-bubble a { color: var(--accent); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(99, 110, 130, 0.1);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--code-text);
    }
    .msg-bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .msg-bubble pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }
    .msg-bubble ul, .msg-bubble ol {
      margin: 6px 0;
      padding-left: 20px;
    }
    .msg-bubble li { margin: 3px 0; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .msg-bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 13px;
    }
    .msg-bubble th, .msg-bubble td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .msg-bubble th { background: var(--tool-bg); font-weight: 600; }
    .msg-bubble tr:nth-child(even) td { background: rgba(16,24,40,0.02); }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* ── Tool blocks ── */
    .tool-block {
      border: 1px solid var(--tool-border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 12px;
    }
    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: var(--tool-bg);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .tool-header:hover { background: var(--card-hover); }
    .tool-name {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--orange);
      font-weight: 600;
    }
    .tool-chevron {
      margin-left: auto;
      color: var(--text-dim);
      transition: transform 0.2s;
    }
    .tool-chevron.open { transform: rotate(90deg); }
    .tool-body {
      display: none;
      padding: 10px 12px;
      background: var(--code-bg);
      border-top: 1px solid var(--tool-border);
    }
    .tool-body.open { display: block; }
    .tool-body pre {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    .tool-result-block {
      border: 1px solid var(--tool-border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 12px;
    }
    .tool-result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: var(--tool-bg);
      cursor: pointer;
      user-select: none;
    }
    .tool-result-header:hover { background: var(--card-hover); }
    .tool-result-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Thinking ── */
    .thinking-block {
      border: 1px solid var(--thinking-border);
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0.7;
    }
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: var(--thinking-bg);
      cursor: pointer;
      font-size: 11px;
      color: var(--purple);
      font-weight: 500;
      user-select: none;
    }
    .thinking-body {
      display: none;
      padding: 10px 12px;
      background: var(--thinking-bg);
      border-top: 1px solid var(--thinking-border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .thinking-body.open { display: block; }
    .thinking-body pre {
      white-space: pre-wrap;
      font-family: var(--font-sans);
      font-size: 12px;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .date-divider span {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Scrollbar global ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d3d8e0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #b4bcc9; }

    @media (max-width: 640px) {
      .sidebar { width: 100%; max-width: 100%; }
      .main { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✦</div>
  <h1>AI Conversations</h1>
  <div class="header-spacer"></div>
  <span class="session-count" id="sessionCount">Loading...</span>
  <button class="reload-btn" onclick="reloadSessions()">↻ Refresh</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-controls">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search conversations..." oninput="filterSessions()" />
      </div>
      <div class="filter-group">
        <span class="filter-label">Sort</span>
        <div class="filter-chips" id="sortBar">
          <span class="filter-chip active" data-sort="recent" onclick="setSort('recent')">Recent</span>
          <span class="filter-chip" data-sort="msgs" onclick="setSort('msgs')">Most messages</span>
        </div>
      </div>
      <div class="filter-group" id="sourceGroup">
        <span class="filter-label">Source</span>
        <div class="filter-chips" id="sourceFilter"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Project</span>
        <div class="filter-chips" id="projectFilter"></div>
      </div>
    </div>
    <div class="session-list" id="sessionList">
      <div class="loading"><div class="spinner"></div>Loading conversations...</div>
    </div>
  </div>

  <div class="content">
    <div class="content-header" id="contentHeader" style="display:none">
      <div class="content-header-top">
        <h2 id="contentTitle"></h2>
        <button class="copy-cmd-btn" id="renameBtn" onclick="toggleRename()" title="Rename this session">✏️ Rename</button>
        <button class="copy-cmd-btn copy-cmd-btn-danger" id="deleteBtn" onclick="toggleDelete()" title="Delete this session">🗑️ Delete</button>
        <button class="copy-cmd-btn" id="copyCmdBtn" onclick="copyResumeCommand()" title="Copy the resume command to clipboard">📋 Copy command</button>
        <button class="resume-btn" id="resumeBtn" onclick="resumeSession()">▶ Continue in terminal</button>
      </div>
      <div class="content-header-meta">
        <span id="contentProject"></span>
        <span id="contentDate"></span>
        <span id="contentMsgCount"></span>
      </div>
      <div class="rename-panel" id="renamePanel" style="display:none">
        <input type="text" id="renameInput" placeholder="New title" onkeydown="if(event.key==='Enter')genRenameCommand()" />
        <button class="copy-cmd-btn" onclick="genRenameCommand()">Generate command</button>
        <div class="rename-cmd" id="renameCmdBox" style="display:none">
          <code id="renameCmdText"></code>
          <button class="copy-cmd-btn" id="renameCopyBtn" onclick="copyRenameCommand()">📋 Copy</button>
          <div class="rename-note" id="renameNote"></div>
        </div>
      </div>
      <div class="rename-panel" id="deletePanel" style="display:none">
        <div class="rename-cmd" style="display:flex">
          <code id="deleteCmdText"></code>
          <button class="copy-cmd-btn" id="deleteCopyBtn" onclick="copyDeleteCommand()">📋 Copy</button>
          <div class="rename-note rename-note-danger" id="deleteNote"></div>
        </div>
      </div>
    </div>
    <div id="emptyState" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select a conversation to view</p>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
  </div>
</div>

<script>
  let allSessions = [];
  let activeProject = 'all';
  let activeSource = 'all';
  let activeSort = 'recent';  // 'recent' | 'msgs'
  let activeSessionId = null;

  const SOURCE_LABELS = { claude: 'Claude', opencode: 'opencode' };

  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      return hljs.highlightAuto(code).value;
    }
  });

  marked.use({
    renderer: {
      code(token) {
        const code = typeof token === 'object' ? token.text : token;
        const lang = typeof token === 'object' ? token.lang : '';
        let highlighted = code;
        if (lang && hljs.getLanguage(lang)) {
          try { highlighted = hljs.highlight(code, { language: lang }).value; } catch(e) {}
        } else {
          try { highlighted = hljs.highlightAuto(code).value; } catch(e) {}
        }
        return `<pre><code class="hljs">${highlighted}</code></pre>`;
      }
    }
  });

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000) {
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    if (diff < 604800000) {
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return days[d.getDay()];
    }
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatFullDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleString('en-US', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  async function loadSessions() {
    const res = await fetch('/api/sessions');
    allSessions = await res.json();
    document.getElementById('sessionCount').textContent = `${allSessions.length} conversations`;
    renderSourceFilter();
    renderProjectFilter();
    renderSessionList();
  }

  function renderSourceFilter() {
    const counts = {};
    allSessions.forEach(s => { counts[s.source] = (counts[s.source] || 0) + 1; });
    const sources = Object.keys(counts).sort();
    // Only show the source filter when more than one source is present
    const container = document.getElementById('sourceFilter');
    const group = document.getElementById('sourceGroup');
    if (sources.length < 2) { group.style.display = 'none'; return; }
    group.style.display = '';
    container.innerHTML = `
      <span class="filter-chip ${activeSource === 'all' ? 'active' : ''}" data-source="all" onclick="setSource('all')">All</span>
      ${sources.map(src =>
        `<span class="filter-chip" data-source="${src}" onclick="setSource('${src}')">${SOURCE_LABELS[src] || src} (${counts[src]})</span>`
      ).join('')}
    `;
  }

  function setSource(source) {
    activeSource = source;
    activeProject = 'all';  // reset second-level filter when source changes
    document.querySelectorAll('#sourceFilter .filter-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.source === source);
    });
    renderProjectFilter();  // re-render projects scoped to the new source
    renderSessionList();
  }

  function getProjects() {
    // Only count projects belonging to the currently selected source (cascading)
    const map = {};
    allSessions.forEach(s => {
      if (activeSource !== 'all' && s.source !== activeSource) return;
      map[s.project] = (map[s.project] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }

  function renderProjectFilter() {
    const projects = getProjects();
    const total = projects.reduce((sum, [, c]) => sum + c, 0);
    const container = document.getElementById('projectFilter');
    container.innerHTML = `
      <span class="filter-chip ${activeProject === 'all' ? 'active' : ''}" data-project="all" onclick="setProject('all')">All (${total})</span>
      ${projects.slice(0, 12).map(([p, c]) =>
        `<span class="filter-chip ${activeProject === p ? 'active' : ''}" data-project="${p}" onclick="setProject('${p}')">${escHtml(p)} (${c})</span>`
      ).join('')}
    `;
  }

  function setProject(project) {
    activeProject = project;
    document.querySelectorAll('#projectFilter .filter-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.project === project);
    });
    renderSessionList();
  }

  function filterSessions() {
    renderSessionList();
  }

  function setSort(sort) {
    activeSort = sort;
    document.querySelectorAll('#sortBar .filter-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.sort === sort);
    });
    renderSessionList();
  }

  function getFilteredSessions() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    return allSessions.filter(s => {
      if (activeSource !== 'all' && s.source !== activeSource) return false;
      if (activeProject !== 'all' && s.project !== activeProject) return false;
      if (query && !s.title.toLowerCase().includes(query) && !s.preview.toLowerCase().includes(query)) return false;
      return true;
    });
  }

  function renderSessionList() {
    const filtered = getFilteredSessions();
    // 'recent' keeps the backend order (by last activity); 'msgs' sorts by message count desc
    if (activeSort === 'msgs') {
      filtered.sort((a, b) => b.msg_count - a.msg_count);
    }
    const list = document.getElementById('sessionList');
    if (filtered.length === 0) {
      list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px;">No conversations found</div>`;
      return;
    }
    list.innerHTML = filtered.map(s => `
      <div class="session-item ${s.id === activeSessionId ? 'active' : ''}"
           onclick="openSession('${s.id}')" data-id="${s.id}">
        <div class="session-title">${escHtml(s.title)}</div>
        <div class="session-id" title="Click to copy ID: ${escHtml(s.id)}" onclick="copySessionId(event, '${s.id}')">${escHtml(s.id)}</div>
        ${s.cwd ? `<div class="session-path" title="${escHtml(s.cwd)}">${escHtml(s.cwd)}</div>` : ''}
        <div class="session-meta">
          <span class="source-badge ${s.source}">${SOURCE_LABELS[s.source] || s.source}</span>
          <span class="session-project">${escHtml(s.project)}</span>
          <span class="session-date">${formatDate(s.last_timestamp || s.timestamp)}</span>
          <span class="session-msgs">${s.msg_count} msgs</span>
        </div>
        ${s.preview ? `<div class="session-preview">${escHtml(s.preview)}</div>` : ''}
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copySessionId(event, id) {
    event.stopPropagation();  // don't open the session when copying its id
    navigator.clipboard.writeText(id).then(() => {
      const el = event.currentTarget;
      const prev = el.textContent;
      el.textContent = '✓ Copied';
      setTimeout(() => { el.textContent = prev; }, 1000);
    }).catch(() => {});
  }

  function resetRenamePanel() {
    document.getElementById('renamePanel').style.display = 'none';
    document.getElementById('renameCmdBox').style.display = 'none';
    document.getElementById('renameCmdText').textContent = '';
    document.getElementById('renameNote').textContent = '';
  }

  function toggleRename() {
    const panel = document.getElementById('renamePanel');
    if (panel.style.display === 'none') {
      resetDeletePanel();  // mutually exclusive with the delete panel
      const s = allSessions.find(x => x.id === activeSessionId);
      const input = document.getElementById('renameInput');
      input.value = s ? s.title : '';
      document.getElementById('renameCmdBox').style.display = 'none';
      panel.style.display = 'flex';
      input.focus();
      input.select();
    } else {
      resetRenamePanel();
    }
  }

  async function genRenameCommand() {
    const title = document.getElementById('renameInput').value.trim();
    if (!title || !activeSessionId) return;
    try {
      const res = await fetch(`/api/sessions/${activeSessionId}/rename-command?title=${encodeURIComponent(title)}`);
      const data = await res.json();
      if (!data.ok) { alert(data.message || 'Failed to generate command'); return; }
      document.getElementById('renameCmdText').textContent = data.command;
      document.getElementById('renameNote').textContent = data.note || '';
      document.getElementById('renameCmdBox').style.display = 'flex';
    } catch (e) {
      alert('Failed to generate command: ' + e.message);
    }
  }

  async function copyRenameCommand() {
    const cmd = document.getElementById('renameCmdText').textContent;
    if (!cmd) return;
    const btn = document.getElementById('renameCopyBtn');
    const prev = btn.textContent;
    try {
      await navigator.clipboard.writeText(cmd);
      btn.textContent = '✓ Copied';
    } catch (e) {
      btn.textContent = '✗ Failed';
    }
    setTimeout(() => { btn.textContent = prev; }, 1500);
  }

  function resetDeletePanel() {
    document.getElementById('deletePanel').style.display = 'none';
  }

  async function toggleDelete() {
    const panel = document.getElementById('deletePanel');
    if (panel.style.display !== 'none') { resetDeletePanel(); return; }
    if (!activeSessionId) return;
    resetRenamePanel();  // mutually exclusive with the rename panel
    try {
      const res = await fetch(`/api/sessions/${activeSessionId}/delete-command`);
      const data = await res.json();
      if (!data.ok) { alert(data.message || 'Failed to generate command'); return; }
      document.getElementById('deleteCmdText').textContent = data.command;
      document.getElementById('deleteNote').textContent = data.note || '';
      panel.style.display = 'flex';
    } catch (e) {
      alert('Failed to generate command: ' + e.message);
    }
  }

  async function copyDeleteCommand() {
    const cmd = document.getElementById('deleteCmdText').textContent;
    if (!cmd) return;
    const btn = document.getElementById('deleteCopyBtn');
    const prev = btn.textContent;
    try {
      await navigator.clipboard.writeText(cmd);
      btn.textContent = '✓ Copied';
    } catch (e) {
      btn.textContent = '✗ Failed';
    }
    setTimeout(() => { btn.textContent = prev; }, 1500);
  }

  // POSIX-quote a string for a shell command (matches backend _build_command)
  function shQuote(s) {
    return "'" + String(s).replace(/'/g, "'\\''") + "'";
  }

  function buildResumeCommand(s) {
    const inner = s.source === 'opencode'
      ? `opencode --session ${s.id}`
      : `claude --resume ${s.id}`;
    return s.cwd ? `cd ${shQuote(s.cwd)} && ${inner}` : inner;
  }

  async function copyResumeCommand() {
    const s = allSessions.find(x => x.id === activeSessionId);
    if (!s) return;
    const btn = document.getElementById('copyCmdBtn');
    const prev = btn.textContent;
    try {
      await navigator.clipboard.writeText(buildResumeCommand(s));
      btn.textContent = '✓ Copied';
    } catch (e) {
      btn.textContent = '✗ Failed';
    }
    setTimeout(() => { btn.textContent = prev; }, 1500);
  }

  async function resumeSession() {
    if (!activeSessionId) return;
    const btn = document.getElementById('resumeBtn');
    const prev = btn.textContent;
    btn.disabled = true; btn.textContent = 'Opening…';
    try {
      const res = await fetch(`/api/sessions/${activeSessionId}/resume`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        btn.textContent = '✓ Opened in terminal';
      } else if (data.command) {
        // Couldn't open a terminal automatically — copy the command so the user can run it.
        try { await navigator.clipboard.writeText(data.command); } catch (e) {}
        btn.textContent = '✗ Copied command instead';
      } else {
        btn.textContent = '✗ Failed';
      }
    } catch (e) {
      btn.textContent = '✗ Failed';
    }
    setTimeout(() => { btn.disabled = false; btn.textContent = prev; }, 2200);
  }

  async function openSession(id) {
    if (activeSessionId === id) return;
    activeSessionId = id;
    resetRenamePanel();  // don't carry rename/delete panels across sessions
    resetDeletePanel();

    // Update list selection
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });

    // Show loading
    document.getElementById('emptyState').style.display = 'none';
    const messagesEl = document.getElementById('messages');
    messagesEl.style.display = 'flex';
    messagesEl.innerHTML = `<div class="loading"><div class="spinner"></div>Loading messages...</div>`;
    document.getElementById('contentHeader').style.display = 'none';

    try {
      const res = await fetch(`/api/sessions/${id}`);
      if (!res.ok) throw new Error('Failed to load');
      const data = await res.json();
      renderSession(data);
    } catch(e) {
      messagesEl.innerHTML = `<div class="loading" style="color:#f85149">Failed to load: ${e.message}</div>`;
    }
  }

  function renderSession(data) {
    const header = document.getElementById('contentHeader');
    header.style.display = 'block';
    document.getElementById('contentTitle').textContent = data.title;
    const srcLabel = SOURCE_LABELS[data.source] || data.source;
    document.getElementById('contentProject').innerHTML =
      `<span class="source-badge ${data.source}">${srcLabel}</span> 📁 ${escHtml(data.project)}`;
    document.getElementById('contentDate').textContent = formatFullDate(data.timestamp);
    document.getElementById('contentMsgCount').textContent = `${data.messages.length} messages`;

    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = '';

    if (data.messages.length === 0) {
      messagesEl.innerHTML = `<div class="loading" style="color:var(--text-muted)">No messages to display</div>`;
      return;
    }

    let lastDate = null;
    data.messages.forEach(msg => {
      // Date divider
      if (msg.timestamp) {
        const d = new Date(msg.timestamp).toLocaleDateString('en-US');
        if (d !== lastDate) {
          lastDate = d;
          const divider = document.createElement('div');
          divider.className = 'date-divider';
          divider.innerHTML = `<span>${d}</span>`;
          messagesEl.appendChild(divider);
        }
      }

      // tool_result blocks come back as role=user in the API but are system output — keep left
      const hasRealUserText = msg.role === 'user' &&
        msg.blocks.some(b => b.type === 'text');
      const side = hasRealUserText ? 'user' : 'assistant';

      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper msg-wrapper-${side}`;

      // Role label
      const roleEl = document.createElement('div');
      roleEl.className = `msg-role msg-role-${side}`;
      const roleNames = { user: 'You', assistant: 'Claude', system: 'System' };
      const displayName = hasRealUserText ? 'You' : (roleNames[msg.role] || msg.role);
      roleEl.innerHTML = `
        <span>${displayName}</span>
        ${msg.timestamp ? `<span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>` : ''}
      `;
      wrapper.appendChild(roleEl);

      // Blocks
      msg.blocks.forEach(block => {
        if (block.type === 'text') {
          const bubble = document.createElement('div');
          bubble.className = `msg-bubble msg-bubble-${msg.role}`;
          try {
            bubble.innerHTML = marked.parse(block.text);
          } catch(e) {
            bubble.textContent = block.text;
          }
          wrapper.appendChild(bubble);
        } else if (block.type === 'thinking') {
          wrapper.appendChild(makeCollapsible('thinking-block', 'thinking-header', 'thinking-body',
            '💭 Thinking', `<pre>${escHtml(block.text)}</pre>`));
        } else if (block.type === 'tool_use') {
          const inputStr = typeof block.input === 'object'
            ? JSON.stringify(block.input, null, 2) : String(block.input);
          wrapper.appendChild(makeToolBlock(block.name, inputStr));
        } else if (block.type === 'tool_result') {
          wrapper.appendChild(makeCollapsible('tool-result-block', 'tool-result-header', 'tool-body',
            '📤 Tool result', `<pre>${escHtml(block.text)}</pre>`));
        }
      });

      messagesEl.appendChild(wrapper);
    });

    messagesEl.scrollTop = 0;
  }

  function makeCollapsible(wrapClass, headerClass, bodyClass, label, bodyHtml) {
    const wrap = document.createElement('div');
    wrap.className = wrapClass;
    wrap.innerHTML = `
      <div class="${headerClass}" onclick="toggleBlock(this)">
        <span>${label}</span>
        <span class="tool-chevron">▶</span>
      </div>
      <div class="${bodyClass}">${bodyHtml}</div>
    `;
    return wrap;
  }

  function makeToolBlock(name, inputStr) {
    const wrap = document.createElement('div');
    wrap.className = 'tool-block';

    const toolIcons = {
      Bash: '⚡', Read: '📄', Edit: '✏️', Write: '💾',
      WebFetch: '🌐', WebSearch: '🔍', Agent: '🤖',
      TodoWrite: '✅', default: '🔧'
    };
    const icon = toolIcons[name] || toolIcons.default;

    wrap.innerHTML = `
      <div class="tool-header" onclick="toggleBlock(this)">
        <span>${icon}</span>
        <span class="tool-name">${escHtml(name)}</span>
        <span class="tool-chevron">▶</span>
      </div>
      <div class="tool-body"><pre>${escHtml(inputStr)}</pre></div>
    `;
    return wrap;
  }

  function toggleBlock(headerEl) {
    const chevron = headerEl.querySelector('.tool-chevron');
    const body = headerEl.nextElementSibling;
    const isOpen = body.classList.toggle('open');
    if (chevron) chevron.classList.toggle('open', isOpen);
  }

  async function reloadSessions() {
    const btn = document.querySelector('.reload-btn');
    btn.textContent = '↻ Refreshing...';
    btn.disabled = true;
    try {
      await fetch('/api/reload');
      await loadSessions();
    } finally {
      btn.textContent = '↻ Refresh';
      btn.disabled = false;
    }
  }

  loadSessions();
</script>
</body>
</html>
